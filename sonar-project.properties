sonar.projectKey=meibelai-python
sonar.projectName=Meibel AI Python

# Scan all services in this repo
sonar.sources=.

# Exclude build artifacts, dependencies, generated files, and infrastructure
sonar.exclusions=\
  **/node_modules/**, \
  **/.git/**, \
  **/dist/**, \
  **/build/**, \
  **/target/**, \
  **/vendor/**, \
  **/__pycache__/**, \
  **/*.pyc, \
  **/venv/**, \
  **/.venv/**, \
  **/infrastructure/**, \
  **/infrastructure-pulumi/**, \
  **/.github/**

# Test file exclusions from coverage
sonar.coverage.exclusions=\
  **/*test**/**, \
  **/*spec**/**, \
  **/conftest.py
